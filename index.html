<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samen-Archiv emigei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <h1>🌱 Mein Samen-Archiv</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Suchen (z.B. Monat oder Name)..." onkeyup="filterPlants()">
    </div>

    <div id="plant-grid" class="plant-grid">
        <p class="loading">Lade Pflanzen...</p>
    </div>
</div>

<script>
    const username = 'emigei';
    const repo = 'pflanzen';

    function getEmoji(name) {
        const n = name.toLowerCase();
        if (n.includes('tomate')) return '🍅';
        if (n.includes('chili') || n.includes('peperoni')) return '🌶️';
        if (n.includes('salat')) return '🥬';
        if (n.includes('gurke')) return '🥒';
        if (n.includes('basilikum') || n.includes('kräuter')) return '🌿';
        if (n.includes('blume') || n.includes('zinnien') || n.includes('rose')) return '🌸';
        if (n.includes('karotte') || n.includes('möhre')) return '🥕';
        if (n.includes('kürbis')) return '🎃';
        if (n.includes('kohl')) return '🥬';
        return '🌱';
    }

    async function loadPlants() {
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
            const files = await response.json();
            const grid = document.getElementById('plant-grid');
            grid.innerHTML = ''; 

            const plantFiles = files
                .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                .sort((a, b) => a.name.localeCompare(b.name));

            plantFiles.forEach(file => {
                const rawName = file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
                const displayName = rawName.charAt(0).toUpperCase() + rawName.slice(1);
                const emoji = getEmoji(file.name);
                
                const card = document.createElement('a');
                card.href = file.name;
                card.className = 'plant-card';
                // Wir speichern den Namen für die Suche in einem Attribut
                card.setAttribute('data-name', rawName.toLowerCase());
                card.innerHTML = `
                    <span class="emoji">${emoji}</span>
                    <span><strong>${displayName}</strong></span>
                `;
                grid.appendChild(card);
            });
        } catch (error) {
            console.error("Fehler:", error);
        }
    }

    // Die Filter-Funktion
    function filterPlants() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('plant-card');

        Array.from(cards).forEach(card => {
            const name = card.getAttribute('data-name');
            // Wenn der Suchbegriff im Namen vorkommt, anzeigen, sonst verstecken
            if (name.includes(input)) {
                card.style.display = "flex";
            } else {
                card.style.display = "none";
            }
        });
    }

    loadPlants();
</script>

</body>
</html>
