<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>QR-Etiketten Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 30px; background: #f0f0f0; padding: 20px; border-radius: 8px; }
        .label-grid { display: grid; grid-template-columns: repeat(auto-fill, 150px); gap: 20px; }
        .label { 
            width: 150px; border: 1px solid #ccc; padding: 10px; 
            text-align: center; page-break-inside: avoid; 
        }
        .label h4 { margin: 0 0 5px 0; word-wrap: break-word; overflow: hidden; }
        .qrcode img { margin: 0 auto; }
        @media print { .controls { display: none; } } /* Versteckt Eingabe beim Drucken */
    </style>
</head>
<body>

<div class="controls">
    <h2>Etiketten-Generator</h2>
    <p>Gib Name und URL ein (pro Zeile eine Pflanze, getrennt durch Komma):</p>
    <textarea id="inputList" rows="10" style="width:100%;">Kapuzinerkresse,https://emigei.github.io/pflanzen/kapuzinerkresse.html
Ochsenherztomate,https://emigei.github.io/pflanzen/tomate.html</textarea>
    <br><br>
    <button onclick="generateLabels()" style="padding:10px 20px; cursor:pointer;">Etiketten erzeugen</button>
    <button onclick="window.print()" style="padding:10px 20px; cursor:pointer;">Drucken (PDF)</button>
</div>

<div id="labels" class="label-grid"></div>

<script>
function generateLabels() {
    const input = document.getElementById('inputList').value;
    const container = document.getElementById('labels');
    container.innerHTML = '';
    
    const lines = input.split('\n');
    lines.forEach(line => {
        if(line.includes(',')) {
            const [name, url] = line.split(',');
            
            // Etikett-Element erstellen
            const labelDiv = document.createElement('div');
            labelDiv.className = 'label';
            
            const title = document.createElement('h4');
            title.innerText = name.trim();
            labelDiv.appendChild(title);
            
            const qrDiv = document.createElement('div');
            qrDiv.className = 'qrcode';
            labelDiv.appendChild(qrDiv);
            
            container.appendChild(labelDiv);
            
            // QR Code erzeugen
            new QRCode(qrDiv, {
                text: url.trim(),
                width: 128,
                height: 128
            });
        }
    });
}
</script>
</body>
</html>
